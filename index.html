<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENEINTHEWORLD</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --dark: #0A0A08;
    --dark2: #111110;
    --text: #F0EDE6;
    --muted: #7A7568;
  }
  body {
    background-color: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }
  .hero {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px 40px;
    position: relative;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
  }
  .brand-mark {
    width: 64px;
    height: 64px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
    animation: fadeUp 0.8s ease both;
  }
  .brand-mark::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.2);
  }
  .brand-mark svg { width: 28px; height: 28px; fill: var(--gold); }
  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 8vw, 48px);
    letter-spacing: 0.12em;
    color: var(--text);
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(14px, 3.5vw, 17px);
    color: var(--gold);
    letter-spacing: 0.04em;
    margin-top: 6px;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  .countries {
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    animation: fadeUp 0.8s 0.3s ease both;
  }
  .countries span { color: var(--gold-light); }
  .open-browser-btn {
    margin-top: 16px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid rgba(201,168,76,0.15);
    padding: 6px 16px;
    border-radius: 20px;
    transition: all 0.3s;
    animation: fadeUp 0.8s 0.4s ease both;
  }
  .open-browser-btn:hover {
    color: var(--gold);
    border-color: rgba(201,168,76,0.4);
  }
  .links {
    width: 100%;
    max-width: 420px;
    padding: 48px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 2px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.8s ease both;
  }
  .link-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.3s ease;
    transform-origin: bottom;
  }
  .link-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .link-item:hover { border-color: rgba(201,168,76,0.4); transform: translateX(4px); }
  .link-item:hover::before { transform: scaleY(1); }
  .link-item:hover::after { opacity: 1; }
  .link-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .link-icon svg { width: 18px; height: 18px; fill: var(--gold); }
  .link-content { flex: 1; }
  .link-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .link-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.08em; color: var(--text); line-height: 1; }
  .link-arrow { color: var(--gold); font-size: 18px; opacity: 0.5; transition: opacity 0.3s, transform 0.3s; }
  .link-item:hover .link-arrow { opacity: 1; transform: translateX(3px); }
  .section-label {
    font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--muted); text-align: center; padding: 28px 0 4px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::before, .section-label::after {
    content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.12);
  }
  .preset-card {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 2px;
    padding: 24px; text-align: center;
    animation: fadeUp 0.8s ease both;
  }
  .preset-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 6px; }
  .preset-desc { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  .preset-swatches { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .swatch { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
  .preset-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px; background: transparent;
    border: 1px solid var(--gold); color: var(--gold);
    font-family: 'Bebas Neue', sans-serif; font-size: 15px;
    letter-spacing: 0.15em; cursor: pointer; transition: all 0.3s;
    text-decoration: none; border-radius: 1px;
  }
  .preset-btn:hover { background: var(--gold); color: var(--dark); }
  .footer { margin-top: 48px; text-align: center; }
  .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.3em; color: var(--muted); }
  .footer-globe { font-size: 20px; margin-bottom: 8px; display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .link-item:nth-child(1) { animation-delay: 0.35s; }
  .link-item:nth-child(2) { animation-delay: 0.45s; }
  .link-item:nth-child(3) { animation-delay: 0.55s; }
  .preset-card { animation-delay: 0.65s; }
</style>
</head>
